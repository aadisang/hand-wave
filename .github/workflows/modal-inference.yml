name: Deploy inference

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/modal-inference.yml"
      - "apps/inference/**"
      - "packages/contract/**"
  workflow_dispatch:

concurrency:
  group: modal-inference
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Validate Modal credentials
        run: |
          missing=0
          if [ -z "${MODAL_TOKEN_ID}" ]; then
            echo "::error title=Missing GitHub secret::Set MODAL_TOKEN_ID in this repository's Actions secrets."
            missing=1
          fi
          if [ -z "${MODAL_TOKEN_SECRET}" ]; then
            echo "::error title=Missing GitHub secret::Set MODAL_TOKEN_SECRET in this repository's Actions secrets."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Create a Modal service user token, then run:"
            echo "  gh secret set MODAL_TOKEN_ID --repo sinarck/hand-wave"
            echo "  gh secret set MODAL_TOKEN_SECRET --repo sinarck/hand-wave"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify model assets
        run: |
          for path in \
            apps/inference/models/best.ckpt \
            apps/inference/models/lm/neutral_english_4gram.kenlm
          do
            test -s "$path"
            if grep -q "git-lfs.github.com/spec" "$path"; then
              echo "::error::$path is still a Git LFS pointer"
              exit 1
            fi
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: apps/inference/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: apps/inference/uv.lock

      - name: Sync deploy environment
        working-directory: apps/inference
        run: uv sync --frozen --group deploy

      - name: Verify Modal auth
        working-directory: apps/inference
        run: uv run --frozen --group deploy modal token info

      - name: Deploy Modal app
        working-directory: apps/inference
        run: uv run --frozen --group deploy modal deploy modal_app.py
