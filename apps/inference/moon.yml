$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'application'
language: 'python'
stack: 'backend'
tags:
  - 'fastapi'
  - 'inference'

project:
  description: 'FastAPI service that owns model loading and CTC decoding.'

dependsOn:
  - 'contract'

tasks:
  dev:
    command:
      - 'uv'
      - 'run'
      - 'python'
      - '-m'
      - 'uvicorn'
      - 'inference.main:app'
      - '--reload'
      - '--host'
      - '0.0.0.0'
      - '--port'
      - '8000'
    deps:
      - 'contract:generate'
    preset: 'server'
