$schema: "https://moonrepo.dev/schemas/project.json"

layer: "application"
language: "swift"

# Tuist owns project generation. Manifests in Project.swift + Tuist/ are the
# source of truth; the .xcodeproj is generated and gitignored.
tasks:
  install:
    command: "tuist install"
    inputs:
      - "Tuist/Package.swift"
      - "Tuist/Package.resolved"
    preset: "utility"

  generate:
    command: "tuist generate --no-open"
    inputs:
      - "Project.swift"
      - "Tuist/**/*"
      - "HandWave/**/*"
    deps:
      - "install"

  build:
    command:
      - "tuist"
      - "build"
      - "HandWave"
      - "--configuration"
      - "Debug"
    deps:
      - "generate"
    inputs:
      - "Project.swift"
      - "Tuist/**/*"
      - "HandWave/**/*"

  test:
    command:
      - "tuist"
      - "test"
      - "HandWave"
    deps:
      - "generate"
    inputs:
      - "Project.swift"
      - "Tuist/**/*"
      - "HandWave/**/*"

  edit:
    command: "tuist edit"
    preset: "utility"

  open:
    command: "xed HandWave.xcworkspace"
    deps:
      - "generate"
    preset: "utility"

  format:
    command:
      - "swift"
      - "format"
      - "--recursive"
      - "--in-place"
      - "HandWave"
      - "Project.swift"
      - "Tuist.swift"
    inputs:
      - "**/*.swift"
      - ".swift-format"

  lint:
    command:
      - "swift"
      - "format"
      - "lint"
      - "--recursive"
      - "--strict"
      - "HandWave"
      - "Project.swift"
      - "Tuist.swift"
    inputs:
      - "**/*.swift"
      - ".swift-format"
