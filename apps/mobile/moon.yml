$schema: "https://moonrepo.dev/schemas/project.json"

layer: "application"
language: "swift"
stack: "frontend"
tags:
  - "ios"
  - "swiftui"
  - "meta-wearables"

project:
  description: "iOS client for glasses and camera-stream recognition."

dependsOn:
  - "contract"

# Tuist owns project generation. Manifests in Project.swift + Tuist/ are the
# source of truth; the .xcodeproj is generated and gitignored.
tasks:
  install:
    command: "tuist install"
    inputs:
      - "Tuist/Package.swift"
      - "Tuist/Package.resolved"
    preset: "utility"

  generate:
    command: "tuist generate --no-open"
    inputs:
      - "/packages/contract/config.json"
      - "Project.swift"
      - "Tuist/**/*"
      - "HandWave/**/*"
    deps:
      - "install"
      - "contract:generate"

  build:
    command:
      - "tuist"
      - "build"
      - "HandWave"
      - "--configuration"
      - "Debug"
    deps:
      - "generate"
    inputs:
      - "/packages/contract/config.json"
      - "Project.swift"
      - "Tuist/**/*"
      - "HandWave/**/*"

  test:
    command:
      - "tuist"
      - "test"
      - "HandWave"
      - "--no-selective-testing"
    deps:
      - "generate"
    inputs:
      - "/packages/contract/config.json"
      - "Project.swift"
      - "Tuist/**/*"
      - "HandWave/**/*"

  edit:
    command: "tuist edit"
    preset: "utility"

  open:
    command: "xed HandWave.xcworkspace"
    deps:
      - "generate"
    preset: "utility"

  format:
    command:
      - "swift"
      - "format"
      - "--recursive"
      - "--in-place"
      - "HandWave"
      - "Project.swift"
      - "Tuist.swift"
    inputs:
      - "**/*.swift"
      - ".swift-format"

  lint:
    command:
      - "swift"
      - "format"
      - "lint"
      - "--recursive"
      - "--strict"
      - "HandWave"
      - "Project.swift"
      - "Tuist.swift"
    inputs:
      - "**/*.swift"
      - ".swift-format"
