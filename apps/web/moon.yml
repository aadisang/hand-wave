$schema: "https://moonrepo.dev/schemas/project.json"

layer: "application"
language: "typescript"
stack: "frontend"
tags:
  - "react"
  - "tanstack-start"
  - "mediapipe"

project:
  description: "Browser capture and realtime recognition UI."

dependsOn:
  - "contract"

tasks:
  dev:
    command: "pnpm exec vite dev"
    deps:
      - "contract:generate"
    preset: "server"

  build:
    command: "pnpm exec vite build"
    deps:
      - "contract:generate"
    inputs:
      - "/packages/contract/config.json"
      - "/packages/contract/src/**/*"
      - "src/**/*"
      - "vite.config.ts"
      - "tsconfig.json"
      - "package.json"
    outputs:
      - ".output"

  test:
    command: "pnpm exec vitest run"
    deps:
      - "contract:generate"
    inputs:
      - "/packages/contract/config.json"
      - "/packages/contract/src/**/*"
      - "src/**/*.test.{ts,tsx}"
      - "src/**/*.{ts,tsx}"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "package.json"

  preview:
    command: "pnpm exec vite preview"
    preset: "server"

  start:
    command: "node .output/server/index.mjs"
    env:
      PORT: "3000"
    deps:
      - "build"
    preset: "server"
