$schema: "https://moonrepo.dev/schemas/project.json"

layer: "library"
language: "typescript"
stack: "systems"
tags:
  - "inference"
  - "contract"
  - "generated"

project:
  description: "Shared inference contract for web, mobile, and backend clients."

workspace:
  inheritedTasks:
    exclude:
      - "format"
      - "formatCheck"
      - "lint"
      - "lintFix"
      - "typecheck"

tasks:
  format:
    command:
      - "pnpm"
      - "exec"
      - "oxfmt"
      - "--write"
      - "."
    inputs:
      - "main.tsp"
      - "tspconfig.yaml"
      - "config.json"
      - "moon.yml"
      - "openapitools.json"
      - "swift6-models.yaml"
      - "package.json"
      - "/pnpm-lock.yaml"
      - "src/**/*"
      - "generated/**/*"
      - "/.oxfmtrc.json"
    preset: "utility"

  formatCheck:
    command:
      - "pnpm"
      - "exec"
      - "oxfmt"
      - "--check"
      - "."
    inputs:
      - "main.tsp"
      - "tspconfig.yaml"
      - "config.json"
      - "moon.yml"
      - "openapitools.json"
      - "swift6-models.yaml"
      - "package.json"
      - "/pnpm-lock.yaml"
      - "src/**/*"
      - "generated/**/*"
      - "/.oxfmtrc.json"

  cleanGenerated:
    command:
      - "rm"
      - "-rf"
      - "generated"
      - "../../apps/web/src/lib/inference/openapi.ts"
      - "../../apps/mobile/HandWave/Sources/Generated/OpenAPI"
      - "../../apps/inference/src/inference/generated_schemas.py"
    preset: "utility"

  compile:
    command:
      - "pnpm"
      - "exec"
      - "tsp"
      - "compile"
      - "."
    inputs:
      - "main.tsp"
      - "tspconfig.yaml"
      - "moon.yml"
      - "package.json"
      - "/pnpm-lock.yaml"
    outputs:
      - "generated/**/*"

  validateConfig:
    command:
      - "pnpm"
      - "exec"
      - "ajv"
      - "validate"
      - "--spec=draft2020"
      - "-s"
      - "generated/json-schema/Config.json"
      - "-r"
      - "generated/json-schema/DecodeCfg.json"
      - "-r"
      - "generated/json-schema/StreamCfg.json"
      - "-r"
      - "generated/json-schema/MpCfg.json"
      - "-r"
      - "generated/json-schema/SmoothSet.json"
      - "-r"
      - "generated/json-schema/SmoothCfg.json"
      - "-d"
      - "config.json"
    deps:
      - "compile"
    inputs:
      - "config.json"
      - "generated/json-schema/**/*.json"
      - "package.json"
      - "/pnpm-lock.yaml"

  generateWeb:
    command:
      - "pnpm"
      - "--dir"
      - "../../apps/web"
      - "exec"
      - "openapi-typescript"
      - "../../packages/contract/generated/openapi/openapi.json"
      - "-o"
      - "src/lib/inference/openapi.ts"
    deps:
      - "compile"
    inputs:
      - "generated/openapi/openapi.json"
      - "/apps/web/package.json"
      - "/pnpm-lock.yaml"
    outputs:
      - "/apps/web/src/lib/inference/openapi.ts"

  generatePython:
    command:
      - "uv"
      - "run"
      - "--project"
      - "../../apps/inference"
      - "--group"
      - "dev"
      - "datamodel-codegen"
      - "--input"
      - "generated/openapi/openapi.json"
      - "--input-file-type"
      - "openapi"
      - "--output-model-type"
      - "pydantic_v2.BaseModel"
      - "--field-constraints"
      - "--use-annotated"
      - "--disable-timestamp"
      - "--formatters"
      - "isort"
      - "ruff-format"
      - "--output"
      - "../../apps/inference/src/inference/generated_schemas.py"
    deps:
      - "compile"
    inputs:
      - "generated/openapi/openapi.json"
      - "/apps/inference/pyproject.toml"
      - "/apps/inference/uv.lock"
    outputs:
      - "/apps/inference/src/inference/generated_schemas.py"

  generateSwift:
    command:
      - "sh"
      - "-c"
      - >-
        JAVA_OPTS=-Dlog.level=error pnpm exec openapi-generator-cli generate
        -g swift6
        -i generated/openapi/openapi.json
        -o ../../apps/mobile/HandWave/Sources/Generated/OpenAPI
        --global-property models,modelDocs=false,modelTests=false,apis=false,supportingFiles=false
        --additional-properties generateAliasAsModel=true
        -c swift6-models.yaml
        >/dev/null
        && sh scripts/postprocess-swift.sh ../../apps/mobile/HandWave/Sources/Generated/OpenAPI
    deps:
      - "compile"
    inputs:
      - "generated/openapi/openapi.json"
      - "openapitools.json"
      - "swift6-models.yaml"
      - "scripts/postprocess-swift.sh"
      - "package.json"
      - "/pnpm-lock.yaml"
    outputs:
      - "/apps/mobile/HandWave/Sources/Generated/OpenAPI/**/*"

  generate:
    command:
      - "true"
    deps:
      - "validateConfig"
      - "generateWeb"
      - "generatePython"
      - "generateSwift"
    options:
      cache: false

  test:
    command:
      - "pnpm"
      - "exec"
      - "ajv"
      - "validate"
      - "--spec=draft2020"
      - "-s"
      - "generated/json-schema/Config.json"
      - "-r"
      - "generated/json-schema/DecodeCfg.json"
      - "-r"
      - "generated/json-schema/StreamCfg.json"
      - "-r"
      - "generated/json-schema/MpCfg.json"
      - "-r"
      - "generated/json-schema/SmoothSet.json"
      - "-r"
      - "generated/json-schema/SmoothCfg.json"
      - "-d"
      - "config.json"
    deps:
      - "compile"
    inputs:
      - "main.tsp"
      - "tspconfig.yaml"
      - "config.json"
      - "moon.yml"
      - "package.json"
      - "/pnpm-lock.yaml"
      - "generated/json-schema/**/*.json"
